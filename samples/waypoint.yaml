# Waypoint proxy for the httpbin namespace.
#
# In Istio ambient, ztunnel handles L4 only (mTLS, identity, basic
# policy). Anything HTTP-aware — L7 routing rules, retries, fault
# injection, AuthorizationPolicy on path/method/headers, JWT claims —
# needs an Envoy. The waypoint IS that Envoy, optional and scoped per
# namespace (or per service, per workload).
#
# Two pieces:
#   1. Patch the httpbin namespace to opt into a waypoint by adding the
#      `istio.io/use-waypoint=waypoint` label (existing dataplane-mode
#      label is preserved by kubectl apply).
#   2. Declare the waypoint as a Kubernetes Gateway with class
#      `istio-waypoint`. Istio's gatewayClass controller auto-creates a
#      Deployment + Service for it (same mechanism as the ingress
#      gateway in step 3).
---
apiVersion: v1
kind: Namespace
metadata:
  name: httpbin
  labels:
    istio.io/dataplane-mode: ambient
    istio.io/use-waypoint: waypoint
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: waypoint
  namespace: httpbin
  labels:
    # Tell Istio this waypoint handles service-level traffic.
    # Alternatives: `workload`, `all`.
    istio.io/waypoint-for: service
spec:
  gatewayClassName: istio-waypoint
  listeners:
    - name: mesh
      port: 15008
      protocol: HBONE
