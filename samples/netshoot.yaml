# netshoot — debugging container (curl, tcpdump, dig, mtr, …). Used as the
# client when calling httpbin, and as the inspection point when verifying that
# mTLS really is on the wire between ztunnels.
# Pinned to worker 2 so traffic to httpbin (on worker 1) crosses nodes.
---
apiVersion: v1
kind: Namespace
metadata:
  name: netshoot
  labels:
    istio.io/dataplane-mode: ambient
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netshoot
  namespace: netshoot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netshoot
  template:
    metadata:
      labels:
        app: netshoot
    spec:
      nodeSelector:
        kubernetes.io/hostname: istio-ambient-worker2
      containers:
        - name: netshoot
          image: nicolaka/netshoot:v0.13
          # Keep the container alive so we can `kubectl exec` into it.
          command: ["sleep", "infinity"]
          ports:
            - name: http
              containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: netshoot
  namespace: netshoot
spec:
  selector:
    app: netshoot
  ports:
    - name: http
      port: 80
      targetPort: 80
