# Istio ingress gateway, declared via the Kubernetes Gateway API (not the
# older Istio v1alpha3 Gateway CRD). Creating this resource triggers Istio's
# gatewayClass controller to auto-deploy a Deployment + Service of the same
# name in this namespace.
#
# To make the gateway pod reachable from the host via kind's containerPort
# 80 → hostPort 80 mapping, we patch the auto-deployed Deployment after it
# appears — see the README step for the kubectl patch commands.
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ingress
  namespace: istio-system
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        # Let HTTPRoutes from any namespace bind to this Gateway. In a real
        # setup you'd restrict via `from: Selector` and a label selector.
        namespaces:
          from: All
